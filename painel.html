<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAHMAR IMÓVEIS - Painel Admin</title>
    <!-- Biblioteca do Supabase que agora funciona 100% online -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background-color: #0b1a30; color: #1e293b; font-family: sans-serif; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; color: white; }
        .header h1 { color: #f59e0b; margin: 0; font-size: 24px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
        .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); height: max-content; }
        h2 { font-size: 16px; color: #475569; margin-top: 0; margin-bottom: 16px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; text-transform: uppercase; }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 4px; }
        input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn { width: 100%; background-color: #f59e0b; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 13px; margin-top: 10px; }
        .btn:hover { background-color: #d97706; }
        .lista-card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; }
        .item-lista { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        .item-lista:last-child { border-bottom: none; }
        .status-badge { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 9999px; }
        .badge-red { background-color: #fee2e2; color: #dc2626; }
        .badge-green { background-color: #d1fae5; color: #059669; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>NAHMAR IMÓVEIS LTDA</h1>
            <p>Painel de Controle do Administrador</p>
        </div>
        <div class="grid">
            <div class="card">
                <h2>➕ Cadastrar Novo Corretor</h2>
                <form id="form-corretor">
                    <div class="form-group"><label>Nome do Corretor</label><input type="text" id="nome-corretor" placeholder="Ex: João Silva" required></div>
                    <div class="form-group"><label>E-mail institucional</label><input type="email" id="email-corretor" placeholder="Ex: joao@nahmarimoveis.com" required></div>
                    <button type="submit" class="btn">Salvar Corretor</button>
                </form>
            </div>
            <div class="card">
                <h2>🎯 Inserir Novo Lead (Cliente)</h2>
                <form id="form-lead">
                    <div class="form-group"><label>Nome do Cliente</label><input type="text" id="nome-lead" placeholder="Ex: Maria Souza" required></div>
                    <div class="form-group"><label>Telefone / WhatsApp</label><input type="tel" id="tel-lead" placeholder="Ex: (41) 99999-9999" required></div>
                    <div class="form-group"><label>E-mail (Opcional)</label><input type="email" id="email-lead" placeholder="Ex: maria@email.com"></div>
                    <button type="submit" class="btn" style="background-color: #10b981;">Injetar na Roleta</button>
                </form>
            </div>
        </div>
        <div class="lista-card">
            <h2>👥 Equipe de Corretores (Nuvem Real)</h2>
            <div id="lista-corretores"></div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = "https://supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_vycEx0Nd7ndAZq6L9A4E3g_0CaGyOZV";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function carregarCorretores() {
            const lista = document.getElementById('lista-corretores');
            lista.innerHTML = "";
            const { data } = await supabase.from('corretores').select('*').order('nome', { ascending: true });
            if (data && data.length > 0) {
                data.forEach(c => {
                    const item = document.createElement('div');
                    item.className = "item-lista";
                    const bClass = c.status === 'ATIVO' ? 'badge-green' : 'badge-red';
                    item.innerHTML = `<div><strong>${c.nome}</strong><br><span style="color:#64748b;font-size:12px;">${c.email}</span></div><div><span class="status-badge ${bClass}">${c.status}</span></div>`;
                    lista.appendChild(item);
                });
            } else {
                lista.innerHTML = `<p style="color:#94a3b8;text-align:center;">Nenhum corretor cadastrado.</p>`;
            }
        }

        document.getElementById('form-corretor').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome-corretor').value;
            const email = document.getElementById('email-corretor').value;
            const { error } = await supabase.from('corretores').insert([{ nome, email, status: 'PAUSADO' }]);
            if (error) alert("Erro: " + error.message);
            else { alert("Sucesso! " + nome + " cadastrado na Nuvem."); document.getElementById('form-corretor').reset(); carregarCorretores(); }
        });

        document.getElementById('form-lead').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nome = document.getElementById('nome-lead').value;
            const telefone = document.getElementById('tel-lead').value;
            const email = document.getElementById('email-lead').value;

            const { data: ativos } = await supabase.from('corretores').select('id, nome').eq('status', 'ATIVO').order('ultima_atualizacao', { ascending: true }).limit(1);
            let corrId = null; let corrNome = "Fila de Espera";
            if (ativos && ativos.length > 0) { corrId = ativos[0].id; corrNome = ativos[0].nome; }

            const { error } = await supabase.from('leads').insert([{ nome, telefone, email, status: corrId ? 'EM ATENDIMENTO' : 'NOVO', corretor_id: corrId }]);
            if (error) alert("Erro: " + error.message);
            else {
                if (corrId) await supabase.from('corretores').update({ ultima_atualizacao: new Date().toISOString() }).eq('id', corrId);
                alert("Lead direcionado para: " + corrNome);
                document.getElementById('form-lead').reset();
            }
        });
        carregarCorretores();
    </script>
</body>
</html>
